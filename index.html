<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Jara Mylove ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        /* --- Animated Pastel Background --- */
        body {
            background: linear-gradient(-45deg, #ffe6ea, #ffc0cb, #ffb6c1, #fcdada);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: #4a4a4a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- Glassmorphism Container --- */
        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 105, 135, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            text-align: center;
            max-width: 500px;
            width: 90%;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            z-index: 10;
        }

        /* --- Animasi Shaky --- */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px) rotate(-3deg); }
            40%, 80% { transform: translateX(10px) rotate(3deg); }
        }

        .shaky {
            animation: shake 0.5s ease-in-out;
            border-color: #ff4d6d !important;
        }

        /* --- Tipografi --- */
        h1 { 
            margin-bottom: 20px; 
            color: #ff4d6d; 
            transition: all 0.3s ease;
            font-weight: 700;
        }
        p { 
            margin-bottom: 25px; 
            font-size: 17px; 
            color: #666; 
            font-weight: 500;
        }

        /* --- Tombol --- */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        button {
            padding: 12px 35px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .btn-yes { 
            background: linear-gradient(45deg, #ff4d6d, #ff758c);
            color: white; 
            box-shadow: 0 8px 15px rgba(255, 77, 109, 0.3);
        }
        .btn-yes:hover { 
            transform: translateY(-5px) scale(1.05); 
            box-shadow: 0 12px 20px rgba(255, 77, 109, 0.4);
        }
        
        .btn-no { 
            background-color: #e0e0e0; 
            color: #777; 
        }
        .btn-no:hover {
            background-color: #d4d4d4;
        }
        
        .warning-text {
            color: #ff4d6d;
            margin-top: 20px;
            font-weight: 700;
            min-height: 24px;
            font-size: 15px;
        }

        /* --- Step 2 & 3: Momen --- */
        .hidden { 
            display: none !important; 
            opacity: 0;
            transform: scale(0.9);
        }

        .moment-btn {
            display: block;
            width: 100%;
            margin-bottom: 15px;
            background-color: #fff;
            border: 2px dashed #ff758c;
            color: #ff4d6d;
        }
        .moment-btn:hover {
            background: linear-gradient(45deg, #ff4d6d, #ff758c);
            color: white;
            border-style: solid;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.3);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .gallery img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
        }
        
        .gallery img:hover {
            transform: scale(1.05) rotate(2deg);
        }

        .btn-back {
            margin-top: 30px;
            background-color: #ffb6c1;
            color: white;
            font-size: 16px;
            box-shadow: 0 5px 15px rgba(255, 182, 193, 0.4);
        }
        .btn-back:hover {
            background-color: #ff9eaa;
            transform: translateY(-3px);
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div id="step1" class="container">
        <h1 id="question-text">Jara sayang aku nggak? 🥺</h1>
        <div class="btn-group">
            <button class="btn-yes" onclick="klikYa()">Ya!</button>
            <button class="btn-no" onclick="klikTidak()">Enggak</button>
        </div>
        <p id="warning-msg" class="warning-text"></p>
    </div>

    <div id="step2" class="container hidden">
        <h1>Makasih yaa Jara sayang! 🥰💖</h1>
        <p>Sekarang, coba pilih salah satu momen favorit kita di bawah ini yaaa:</p>
        <button class="moment-btn" onclick="tampilkanMomen('jalan')">Rumah Jikri 🚗</button>
        <button class="moment-btn" onclick="tampilkanMomen('makan')">Bogor 🍜</button>
        <button class="moment-btn" onclick="tampilkanMomen('lucu')">Kemanggisan 🤪</button>
        <button class="moment-btn" onclick="tampilkanMomen('ultah')">Angkringan 🎂</button>
        <button class="moment-btn" onclick="tampilkanMomen('spesial')">Randommm ✨</button>
    </div>

    <div id="step3" class="container hidden">
        <h1 id="judul-galeri">Momen Kita</h1>
        <div id="tempat-foto" class="gallery">
            </div>
        <button class="btn-back" onclick="kembaliKeMenu()">Kembali Pilih Momen 🎀</button>
    </div>

    <script>
        // Variabel untuk Step 1
        let jumlahKlikYa = 0;
        const teksPertanyaan = document.getElementById("question-text");
        const pesanWarning = document.getElementById("warning-msg");
        const wadahStep1 = document.getElementById("step1");

        // Fungsi Ledakan Confetti
        function luncurkanConfetti() {
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 9999 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { 
                    particleCount,
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }
                }));
                confetti(Object.assign({}, defaults, { 
                    particleCount,
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }
                }));
            }, 250);
        }

        // Fungsi Tombol YA
        function klikYa() {
            jumlahKlikYa++;
            pesanWarning.innerText = ""; 
            
            if (jumlahKlikYa === 1) {
                teksPertanyaan.innerText = "Yang bener Jara?? 🤔";
                teksPertanyaan.style.fontSize = "2.2rem";
            } else if (jumlahKlikYa === 2) {
                teksPertanyaan.innerText = "Seriusan nih beb??? 🥹❤️";
                teksPertanyaan.style.fontSize = "2.4rem";
            } else if (jumlahKlikYa === 3) {
                // Transisi halus ke Step 2
                wadahStep1.style.opacity = "0";
                setTimeout(() => {
                    wadahStep1.classList.add("hidden");
                    const step2 = document.getElementById("step2");
                    step2.classList.remove("hidden");
                    
                    // Panggil fungsi confetti pas pindah ke layar ucapan makasih!
                    luncurkanConfetti();

                    setTimeout(() => step2.style.opacity = "1", 50);
                }, 300);
            }
        }

        // Fungsi Tombol TIDAK
        function klikTidak() {
            wadahStep1.classList.add("shaky");
            
            setTimeout(() => {
                wadahStep1.classList.remove("shaky");
            }, 500);

            const alasanLucu = [
                "Ih dilarang pencet ini! 😤",
                "Tombolnya lagi error, pencet yang 'Ya!' aja ya mylove! 😜",
                "Gabisa Jir jangan dipencet lagi 😌",
                "Yang benerr lah sayangg! 💖"
            ];
            
            let randomText = alasanLucu[Math.floor(Math.random() * alasanLucu.length)];
            pesanWarning.innerText = randomText;
        }

        // Data Foto
        const dataFoto = {
            'jalan': ["1.jpg", "2.jpg", "3.jpg"],
            'makan': ["4.jpg", "5.jpg", "6.jpg", "42.jpg"],
            'lucu': ["7.jpg", "8.jpg", "9.jpg"],
            'ultah': ["10.jpg", "11.jpg", "12.jpg", "101.jpg"],
            'spesial': ["14.jpg", "13.jpg", "15.jpg", "142.jpg", "143.png"]
        };

        const judulMomen = {
            'jalan': "Rumah Jikri 🚗",
            'makan': "Bogor 🍜",
            'lucu': "Kemanggisan 🤪",
            'ultah': "Angkringan 🎂",
            'spesial': "Randommm ✨"
        };

        // Fungsi Menampilkan Momen (Step 3)
        function tampilkanMomen(kategori) {
            const step2 = document.getElementById("step2");
            const step3 = document.getElementById("step3");

            step2.style.opacity = "0";
            setTimeout(() => {
                step2.classList.add("hidden");
                step3.classList.remove("hidden");
                
                document.getElementById("judul-galeri").innerText = judulMomen[kategori];

                let galeriHTML = "";
                dataFoto[kategori].forEach(namaFile => {
                    galeriHTML += `<img src="${namaFile}" alt="Foto Momen Jara & Aku">`;
                });
                document.getElementById("tempat-foto").innerHTML = galeriHTML;

                setTimeout(() => step3.style.opacity = "1", 50);
            }, 300);
        }

        // Fungsi Kembali ke Step 2
        function kembaliKeMenu() {
            const step2 = document.getElementById("step2");
            const step3 = document.getElementById("step3");

            step3.style.opacity = "0";
            setTimeout(() => {
                step3.classList.add("hidden");
                step2.classList.remove("hidden");
                setTimeout(() => step2.style.opacity = "1", 50);
            }, 300);
        }
    </script>
</body>
</html>
